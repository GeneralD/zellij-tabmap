name: CI

on: push

permissions:
  contents: read

env:
  RUSTFLAGS: "-Dwarnings"

jobs:
  clippy:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: wasm32-wasip1
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Run Clippy
        run: cargo clippy --target wasm32-wasip1 --all-features --lib

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --lib --target x86_64-unknown-linux-gnu

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - uses: Swatinem/rust-cache@v2

      - name: Generate coverage
        run: cargo llvm-cov --lib --target x86_64-unknown-linux-gnu --lcov --output-path lcov.info

      - name: Upload to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false

  build:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: wasm32-wasip1

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --target wasm32-wasip1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zellij-tabmap.wasm
          path: target/wasm32-wasip1/release/zellij-tabmap.wasm
